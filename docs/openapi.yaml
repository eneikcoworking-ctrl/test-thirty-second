openapi: 3.0.3
info:
  title: Project Notes API
  description: REST API for creating, reading, updating, and deleting Project Notes, with authentication and owner authorization checks.
  version: 1.0.0
paths:
  /notes:
    get:
      summary: List notes
      description: Retrieve the list of notes owned by the authenticated user, sorted by updated_at or created_at in descending order (newest-first). Supports optional title filtering.
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Search term to filter notes by title (case-insensitive substring match).
      responses:
        '200':
          description: A list of notes.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NoteResponse'
        '401':
          description: Unauthorized. Active session/credentials required.
    post:
      summary: Create note
      description: Create a new note owned by the authenticated user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NoteCreate'
      responses:
        '201':
          description: Note successfully created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteResponse'
        '400':
          description: Invalid request data.
        '401':
          description: Unauthorized.
  /notes/{id}:
    get:
      summary: Get note
      description: Retrieve a single note by ID. Must be owned by the authenticated user.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Note successfully retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteResponse'
        '401':
          description: Unauthorized.
        '403':
          description: Forbidden. Requester is not the owner of this note.
        '404':
          description: Note not found.
    put:
      summary: Update note
      description: Update an existing note's title and body. Must be owned by the authenticated user.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NoteUpdate'
      responses:
        '200':
          description: Note successfully updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteResponse'
        '401':
          description: Unauthorized.
        '403':
          description: Forbidden. Requester is not the owner of this note.
        '404':
          description: Note not found.
    delete:
      summary: Delete note
      description: Delete an existing note. Must be owned by the authenticated user.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Note successfully deleted. No content returned.
        '401':
          description: Unauthorized.
        '403':
          description: Forbidden. Requester is not the owner of this note.
        '404':
          description: Note not found.
components:
  schemas:
    NoteCreate:
      type: object
      required:
        - title
        - body
      properties:
        title:
          type: string
          maxLength: 100
          description: Short title of the note.
        body:
          type: string
          description: Main body text of the note.
    NoteUpdate:
      type: object
      required:
        - title
        - body
      properties:
        title:
          type: string
          maxLength: 100
        body:
          type: string
    NoteResponse:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        body:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        owner_id:
          type: string
          description: Username/identifier of the note's owner.
