<body class="flex flex-col min-h-screen">

<main class="flex-grow flex flex-col justify-center px-margin-mobile pt-20 pb-32 max-w-md mx-auto w-full">

<!-- Login Form -->
<section class="space-y-md">
<!-- Email Field -->

<div class="relative">
<input class="w-full h-[48px] px-md bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md focus:outline-none focus:border-primary input-focus-ring transition-all placeholder:text-outline" id="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1" for="password">Password</label>
<div class="relative">
<input class="w-full h-[48px] px-md bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md focus:outline-none focus:border-primary input-focus-ring transition-all placeholder:text-outline" id="password" placeholder="••••••••" type="password"/>
</div>
<div class="flex justify-end">
<a class="font-label-sm text-label-sm text-primary hover:opacity-80 transition-opacity" href="#">Forgot Password?</a>
</div>
</div>
<!-- Sign In Button -->
<button class="w-full h-[48px] bg-primary text-on-primary font-label-md text-label-md rounded-lg elevation-l1 active:scale-95 transition-transform mt-lg">

<!-- Micro-interaction Script -->
<script>
        document.querySelectorAll('button, a').forEach(elem => {
            elem.addEventListener('mousedown', () => {
                elem.style.transform = 'scale(0.98)';
            });
            elem.addEventListener('mouseup', () => {
                elem.style.transform = 'scale(1)';
            });
            elem.addEventListener('mouseleave', () => {
                elem.style.transform = 'scale(1)';
            });
        });

        // Basic form focus visual feedback
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.previousElementSibling.classList.add('text-primary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.previousElementSibling.classList.remove('text-primary');
            });
        });
    </script>
